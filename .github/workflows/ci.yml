name: CI

# Enforcement spine (TECH_DEBT_AUDIT_2026-06-28.md, D2): lint + test + build on
# every push / PR. The project's "no claims without evidence" rule needs a
# machine that actually runs the suites. TS engines and the Python substrate are
# blocking; the polyglot curriculum jobs are informational until D13 (parity
# vectors + stub completion) lands.

# Push runs only on main (agent-generated feature branches were burning the full
# matrix on every push — TECH_DEBT_AUDIT_2026-07-08 item 15); PRs still run everywhere.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  codexdojo:
    name: codexDojo (TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engines/codexDojo
    steps:
      - uses: actions/checkout@v4
      # Install pnpm without scanning a monorepo workspace at repo root
      # (standalone engines; no root package.json / pnpm-workspace.yaml).
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          package_json_file: engines/codexDojo/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: engines/codexDojo/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  pixeldojo:
    name: pixelDojo (TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engines/pixelDojo
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: engines/pixelDojo/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: engines/pixelDojo/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
        working-directory: engines/pixelDojo/pixel-quest
      - run: pnpm test
        working-directory: engines/pixelDojo/pixel-quest
      - run: pnpm build
        working-directory: engines/pixelDojo/pixel-quest

  python:
    name: Python (tutor core + substrate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest

  curriculum-go:
    name: curriculum Go (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: go test (every go.mod under curriculum)
        run: |
          set -e
          find curriculum -name go.mod -execdir go test ./... \;

  curriculum-rust:
    name: curriculum Rust (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo test (every Cargo.toml under curriculum)
        run: |
          set -e
          find curriculum -name Cargo.toml -execdir cargo test \;
