<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIR TRAFFIC — voxelDojo game 11</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin: 0; display: flex; height: 100vh; background: #0b0e14; color: #e6e9f2;
             font-family: ui-monospace, "Cascadia Mono", Menlo, monospace; }
      #stage { flex: 1; width: 100%; height: 100%; display: block; }
      #hud { width: 360px; padding: 16px; overflow-y: auto; border-left: 1px solid #3d4663;
             display: flex; flex-direction: column; gap: 10px; }
      #hud h1 { font-size: 18px; margin: 0; }
      #hud .lesson { color: #aab3cc; margin: 0; }
      #hud .rule { color: #7f8ab0; font-size: 12px; margin: 0; }
      #hud .status { min-height: 3em; color: #ffd54f; }
      #hud button { background: #1a2030; color: #e6e9f2; border: 1px solid #3d4663; border-radius: 6px;
                    padding: 8px 10px; margin: 2px; cursor: pointer; font: inherit; text-align: left; }
      #hud button:hover { border-color: #4fc3f7; }
      #hud .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; }
      #hud .metrics { font-size: 11px; color: #aab3cc; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <aside id="hud"></aside>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
