<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GATEKEEPER — pixelDojo · 01 Rate Limiter</title>
<style>
  :root { --scale: 3; }
  html, body {
    margin: 0; height: 100%; background: #07060f; color: #c9c9e6;
    font-family: "Courier New", monospace; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px; user-select: none;
  }
  #wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  canvas {
    width: calc(256px * var(--scale)); height: calc(240px * var(--scale));
    image-rendering: pixelated; image-rendering: crisp-edges;
    background: #0d0b1a; border: 2px solid #2a2746;
    box-shadow: 0 0 0 4px #07060f, 0 10px 40px rgba(0,0,0,.6);
  }
  .hint { font-size: 12px; color: #6f6c93; letter-spacing: .5px; max-width: 760px; text-align: center; }
  .hint b { color: #f7c531; }
  #ev { display: none; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="g" width="256" height="240"></canvas>
  <div class="hint">
    <b>←/→</b> move lane &nbsp; <b>Z</b> admit (spends a token) &nbsp; <b>Enter</b> start/restart &nbsp; <b>P</b> pause &nbsp; <b>M</b> mute
    <br/>Admit <span style="color:#4bd44b">green</span> traffic, let <span style="color:#e23b3b">red</span> hit the door (free 429). Tokens refill slowly — spend them like the bucket does.
  </div>
  <pre id="ev"></pre>
</div>
<script>
"use strict";
const cv = document.getElementById("g");
const ctx = cv.getContext("2d", { alpha: false });
ctx.imageSmoothingEnabled = false;
const W = 256, H = 240;

// ---- Tunables (the token-bucket concept, made playable) ----
const C = 6;            // bucket capacity
const R = 1.5;          // refill rate (tokens / sec)
const HEAT_MAX = 100;
const HEAT_COOL = 10;   // backend cools this fast (/sec)
const HEAT_LEGIT = 9;   // backend load per admitted legit request
const HEAT_ABUSE = 24;  // breach: admitting attacker
const SCORE_LEGIT = 10, SCORE_ABUSE = -8;
const DOOR_Y = 72;
const GATE_LO = DOOR_Y, GATE_HI = DOOR_Y + 34;  // admittable window
const LANE_X = [52, 128, 204];
const TARGET_TIME = 45; // a full "shift"

// ---- Palette ----
const COL = {
  bg: "#0d0b1a", bg2: "#171432", grid: "#211d3e",
  white: "#f4f4f4", dim: "#8a86b0", dark: "#07060f",
  green: "#4bd44b", greenD: "#2b7a2b",
  red: "#e23b3b", redD: "#8f1f1f",
  amber: "#f7c531", amberD: "#a07d12",
  blue: "#4aa3ff", hot: "#e2473b",
};

// ---- State ----
let state = "title";  // title | play | over
let result = null;    // 'win' | 'lose'
let tokens, heat, heatPeak, score, elapsed, spawnTimer, bouncerLane;
let goodAdmits, legitRejected, abusiveAdmitted, abusiveRejected, overheated;
let requests, floats, admitTimes, shake;
let muted = false, paused = false;

function reset() {
  tokens = C; heat = 0; heatPeak = 0; score = 0; elapsed = 0;
  spawnTimer = 0.8; bouncerLane = 1;
  goodAdmits = 0; legitRejected = 0; abusiveAdmitted = 0; abusiveRejected = 0;
  overheated = false; requests = []; floats = []; admitTimes = []; shake = 0;
  result = null;
}

// ---- Audio (tiny WebAudio blips, created on first input) ----
let actx = null;
function beep(freq, dur, type = "square", vol = 0.05) {
  if (muted) return;
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === "suspended") actx.resume();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.value = vol; o.connect(g); g.connect(actx.destination);
    const t = actx.currentTime;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur);
  } catch (e) { /* audio optional */ }
}
const sAdmit = () => beep(660, 0.08, "square", 0.05);
const sBreach = () => { beep(120, 0.25, "sawtooth", 0.07); };
const sReject = () => beep(220, 0.06, "square", 0.03);
const sEmpty = () => beep(90, 0.12, "triangle", 0.05);

// ---- Input ----
const pressed = (e) => {
  if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"," "].includes(e.key)) e.preventDefault();
  const k = e.key.toLowerCase();
  if (state !== "play") {
    if (k === "enter" || k === " ") { reset(); state = "play"; }
    if (k === "m") muted = !muted;
    return;
  }
  if (k === "p") { paused = !paused; return; }
  if (k === "m") { muted = !muted; return; }
  if (paused) return;
  if (k === "arrowleft" || k === "a") bouncerLane = Math.max(0, bouncerLane - 1);
  else if (k === "arrowright" || k === "d") bouncerLane = Math.min(2, bouncerLane + 1);
  else if (k === "z" || k === "j" || k === " ") tryAdmit();
};
window.addEventListener("keydown", pressed);

function tryAdmit() {
  // frontmost unresolved request in this lane, inside the gate window
  let best = null;
  for (const r of requests) {
    if (r.resolved || r.lane !== bouncerLane) continue;
    if (r.y >= GATE_LO && r.y <= GATE_HI) {
      if (!best || r.y < best.y) best = r;
    }
  }
  if (!best) { sEmpty(); return; }
  if (tokens < 1) {              // bucket empty — scarcity is the lesson
    sEmpty();
    floats.push({ x: LANE_X[bouncerLane], y: DOOR_Y + 18, t: 0.8, text: "NO TOKENS", col: COL.amber });
    return;
  }
  tokens -= 1;
  admitTimes.push(elapsed);
  best.resolved = true; best.action = "admit"; best.flashT = 0.5; best.vy = -150;
  if (best.type === "legit") {
    score += SCORE_LEGIT; goodAdmits++; heat += HEAT_LEGIT; sAdmit();
    floats.push({ x: best.x, y: best.y, t: 0.6, text: "+" + SCORE_LEGIT, col: COL.green });
  } else {
    score += SCORE_ABUSE; abusiveAdmitted++; heat += HEAT_ABUSE; shake = 0.35; sBreach();
    floats.push({ x: best.x, y: best.y, t: 0.9, text: "BREACH!", col: COL.red });
  }
}

function resolveReject(r) {
  r.resolved = true; r.action = "reject"; r.flashT = 0.6; r.vy = 55;
  if (r.type === "abusive") { abusiveRejected++; sReject(); }
  else { legitRejected++; sReject();
    floats.push({ x: r.x, y: r.y, t: 0.7, text: "missed", col: COL.dim }); }
}

// ---- Spawning ----
function spawnReq() {
  const lane = (Math.random() * 3) | 0;
  const abusiveProb = lerp(0.28, 0.5, clamp(elapsed / 55, 0, 1));
  const type = Math.random() < abusiveProb ? "abusive" : "legit";
  requests.push({ lane, x: LANE_X[lane], y: H + 8, type, resolved: false, action: null,
    flashT: 0, vy: 0, wob: Math.random() * 6.28 });
}

// ---- Update ----
function update(dt) {
  if (state !== "play" || paused) return;
  elapsed += dt;
  tokens = Math.min(C, tokens + R * dt);
  heat = Math.max(0, heat - HEAT_COOL * dt);
  heatPeak = Math.max(heatPeak, heat);
  if (shake > 0) shake = Math.max(0, shake - dt);

  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    const base = lerp(1.3, 0.55, clamp(elapsed / 50, 0, 1));
    spawnTimer = base * (0.7 + Math.random() * 0.6);
    spawnReq();
  }

  const speed = 26 + elapsed * 0.32;
  for (const r of requests) {
    if (r.resolved) { r.y += r.vy * dt; r.flashT -= dt; continue; }
    r.y -= speed * dt;
    if (r.y <= DOOR_Y) resolveReject(r);
  }
  requests = requests.filter(r => !(r.resolved && r.flashT <= 0) && r.y > -20 && r.y < H + 40);

  for (const f of floats) { f.y -= 14 * dt; f.t -= dt; }
  floats = floats.filter(f => f.t > 0);

  if (heat >= HEAT_MAX) { overheated = true; endGame("lose"); }
  else if (elapsed >= TARGET_TIME) endGame("win");
}

function endGame(res) {
  result = res; state = "over";
  const ev = buildEvidence();
  window.__evidence = ev;
  document.getElementById("ev").textContent = JSON.stringify(ev);
  console.log("EVIDENCE " + JSON.stringify(ev));
  if (res === "win") { beep(660,0.1); setTimeout(()=>beep(880,0.15),110); }
  else { beep(160,0.3,"sawtooth"); }
}

// ---- Evidence (the learning-gate payload; verifier decides mastery) ----
function maxAdmitsInWindow(times, win) {
  let max = 0;
  for (let i = 0; i < times.length; i++) {
    let c = 0;
    for (let j = i; j < times.length; j++) if (times[j] - times[i] <= win) c++;
    if (c > max) max = c;
  }
  return max;
}
function buildEvidence() {
  const dur = Math.max(elapsed, 0.001);
  const rate = goodAdmits / dur;
  const pass = !overheated && abusiveAdmitted === 0 && goodAdmits >= 12 &&
               rate <= R * 1.35 && dur >= TARGET_TIME * 0.99;
  return {
    unit_id: "U0-sonda-rate-limiter-robustness", project: "01_rate_limiter",
    game: "GATEKEEPER", ts: new Date().toISOString(),
    duration_s: +dur.toFixed(1), bucket_capacity: C, target_rate: R,
    observed_admit_rate: +rate.toFixed(2), max_burst_1s: maxAdmitsInWindow(admitTimes, 1.0),
    good_admits: goodAdmits, legit_rejected: legitRejected,
    abusive_admitted: abusiveAdmitted, abusive_rejected: abusiveRejected,
    heat_peak: Math.round(heatPeak), overheated, pass
  };
}

// ---- Helpers ----
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function px(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x | 0, y | 0, w | 0, h | 0); }
function lerpHex(h1, h2, t) {
  const a = parseInt(h1.slice(1), 16), b = parseInt(h2.slice(1), 16);
  const ar = (a>>16)&255, ag=(a>>8)&255, ab=a&255, br=(b>>16)&255, bg=(b>>8)&255, bb=b&255;
  const r = Math.round(lerp(ar,br,t)), g = Math.round(lerp(ag,bg,t)), bl = Math.round(lerp(ab,bb,t));
  return "#" + ((1<<24)+(r<<16)+(g<<8)+bl).toString(16).slice(1);
}
function text(str, x, y, c, size = 8, align = "left") {
  ctx.fillStyle = c; ctx.textBaseline = "top"; ctx.textAlign = align;
  ctx.font = "bold " + size + "px 'Courier New', monospace";
  ctx.fillText(str, x | 0, y | 0);
  ctx.textAlign = "left";
}

// ---- Render ----
function draw() {
  ctx.save();
  let ox = 0, oy = 0;
  if (shake > 0) { ox = (Math.random()-0.5) * shake * 12; oy = (Math.random()-0.5) * shake * 12; }
  ctx.translate(ox | 0, oy | 0);

  // background
  px(0, 0, W, H, COL.bg);
  for (let y = 96; y < H; y += 16) px(0, y, W, 1, COL.grid);
  for (let i = 0; i < 3; i++) px(LANE_X[i] - 28, 96, 56, H - 96, COL.bg2);

  drawServer();
  drawDoors();
  for (const r of requests) drawRequest(r);
  drawBouncer();
  drawTokens();
  drawHUD();
  for (const f of floats) text(f.text, f.x, f.y, f.col, 8, "center");

  // scanlines
  ctx.globalAlpha = 0.06;
  for (let y = 0; y < H; y += 2) px(0, y, W, 1, "#000");
  ctx.globalAlpha = 1;

  ctx.restore();

  if (state === "title") drawTitle();
  else if (state === "over") drawOver();
  else if (paused) { dim(); text("PAUSED", W/2, H/2 - 4, COL.white, 16, "center"); }
}

function drawServer() {
  const t = clamp(heat / HEAT_MAX, 0, 1);
  const body = lerpHex(COL.blue, COL.hot, t);
  px(0, 0, W, 30, COL.dark);
  px(2, 2, W - 4, 26, "#15203a");
  // rack windows light up / heat up
  for (let i = 0; i < 10; i++) {
    const on = (i / 10) < t;
    px(10 + i * 24, 7, 14, 7, on ? body : "#0e1730");
    px(10 + i * 24, 17, 14, 5, on ? lerpHex("#27407a", COL.hot, t) : "#0e1730");
  }
  text("SERVER", 6, 3, COL.white, 8);
  text(Math.round(heat) + "%", W - 6, 3, t > 0.7 ? COL.red : COL.dim, 8, "right");
  // heat bar
  px(2, 30, W - 4, 4, COL.dark);
  px(3, 31, (W - 6) * t, 2, t > 0.7 ? COL.red : COL.amber);
}

function drawDoors() {
  for (let i = 0; i < 3; i++) {
    const x = LANE_X[i];
    px(x - 26, DOOR_Y, 52, 2, COL.grid);
    px(x - 26, DOOR_Y - 10, 3, 12, "#2c2750");
    px(x + 23, DOOR_Y - 10, 3, 12, "#2c2750");
  }
}

function drawBouncer() {
  const x = LANE_X[bouncerLane], y = DOOR_Y - 2;
  // shadow
  px(x - 8, y + 14, 16, 2, "#05040c");
  // body
  px(x - 7, y - 2, 14, 16, COL.dark);
  px(x - 6, y - 1, 12, 14, "#3a3f63");
  px(x - 6, y + 5, 12, 2, "#2a2e4c");
  // visor
  px(x - 4, y + 1, 8, 3, COL.amber);
  // antenna
  px(x - 1, y - 6, 2, 4, "#6f6c93"); px(x - 1, y - 8, 2, 2, COL.red);
  // arms hint of "stop"
  px(x - 9, y + 4, 2, 5, "#3a3f63"); px(x + 7, y + 4, 2, 5, "#3a3f63");
}

function drawRequest(r) {
  const x = r.x, y = r.y;
  if (r.resolved && r.action === "reject") {
    ctx.globalAlpha = clamp(r.flashT / 0.6, 0, 1);
    text("429", x, y - 12, COL.red, 8, "center");
  }
  ctx.globalAlpha = r.resolved ? clamp(r.flashT / 0.6, 0.2, 1) : 1;
  const base = r.type === "legit" ? COL.green : COL.red;
  const dk = r.type === "legit" ? COL.greenD : COL.redD;
  px(x - 7, y - 7, 14, 14, COL.dark);
  px(x - 6, y - 6, 12, 12, base);
  px(x - 6, y, 12, 6, dk);
  // eyes
  px(x - 4, y - 4, 2, 2, COL.white); px(x + 2, y - 4, 2, 2, COL.white);
  if (r.type === "legit") { px(x - 3, y + 1, 6, 1, COL.dark); px(x - 4, y + 1, 1, 1, COL.dark); px(x + 3, y + 1, 1, 1, COL.dark); }
  else { px(x - 4, y + 2, 8, 1, COL.dark); px(x - 5, y - 6, 2, 1, COL.dark); px(x + 3, y - 6, 2, 1, COL.dark); }
  ctx.globalAlpha = 1;
}

function drawTokens() {
  const full = Math.floor(tokens);
  const frac = tokens - full;
  const bx = 6, by = 37;
  text("TOKENS", bx, by - 1, COL.dim, 8);
  for (let i = 0; i < C; i++) {
    const x = bx + 54 + i * 12, y = by - 2;
    px(x, y, 9, 9, COL.dark);
    if (i < full) { px(x + 1, y + 1, 7, 7, COL.amber); px(x + 1, y + 5, 7, 3, COL.amberD); }
    else if (i === full && frac > 0.05) { const hgt = Math.max(1, Math.round(7 * frac)); px(x + 1, y + 8 - hgt, 7, hgt, COL.amberD); }
    else px(x + 1, y + 1, 7, 7, "#1c1838");
  }
}

function drawHUD() {
  text("SCORE " + score, 6, H - 11, COL.white, 8);
  const left = Math.max(0, TARGET_TIME - elapsed);
  text("SHIFT " + left.toFixed(0).padStart(2, "0") + "s", W - 6, H - 11, COL.dim, 8, "right");
}

function dim() { ctx.globalAlpha = 0.72; px(0, 0, W, H, "#05040c"); ctx.globalAlpha = 1; }

function drawTitle() {
  dim();
  text("GATEKEEPER", W/2, 60, COL.amber, 16, "center");
  text("token-bucket rate limiter", W/2, 82, COL.green, 8, "center");
  text("pixelDojo · curriculum 01", W/2, 94, COL.dim, 8, "center");
  text("Admit GREEN, bounce RED.", W/2, 124, COL.white, 8, "center");
  text("Tokens refill slowly: spend", W/2, 136, COL.dim, 8, "center");
  text("them like the bucket does.", W/2, 146, COL.dim, 8, "center");
  text("- PRESS ENTER -", W/2, 176, COL.amber, 8, "center");
}

function drawOver() {
  dim();
  const ev = window.__evidence || buildEvidence();
  const win = result === "win";
  text(win ? "SHIFT COMPLETE" : "SERVER DOWN", W/2, 36, win ? COL.green : COL.red, 16, "center");
  text("SCORE " + score, W/2, 60, COL.white, 8, "center");
  let y = 80;
  const row = (k, v, c) => { text(k, 40, y, COL.dim, 8); text(v, W - 40, y, c || COL.white, 8, "right"); y += 11; };
  row("admit rate", ev.observed_admit_rate + " / " + R + " tgt", Math.abs(ev.observed_admit_rate - R) < 0.6 ? COL.green : COL.amber);
  row("legit admitted", "" + ev.good_admits, COL.green);
  row("legit rejected", "" + ev.legit_rejected, COL.dim);
  row("attackers in", "" + ev.abusive_admitted, ev.abusive_admitted ? COL.red : COL.green);
  row("attackers bounced", "" + ev.abusive_rejected, COL.green);
  row("peak heat", ev.heat_peak + "%", ev.heat_peak > 70 ? COL.red : COL.dim);
  y += 4;
  text("DIAGNOSTIC: " + (ev.pass ? "PASS" : "REVIEW"), W/2, y, ev.pass ? COL.green : COL.amber, 8, "center");
  text("- PRESS ENTER -", W/2, 210, COL.amber, 8, "center");
}

// ---- Loop ----
let last = performance.now();
function frame(now) {
  let dt = (now - last) / 1000; last = now;
  if (dt > 0.05) dt = 0.05;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}
reset();
requestAnimationFrame(frame);
// expose for headless testing
window.__game = { state: () => state, evidence: () => window.__evidence,
  set lane(v){ bouncerLane = clamp(v,0,2); }, get lane(){ return bouncerLane; } };
</script>
</body>
</html>
