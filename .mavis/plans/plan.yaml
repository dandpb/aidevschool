version: 1
plan:
  name: 'AI DevSchool — Project 01 (Token-Bucket Rate Limiter) full cycle'
  max_concurrency: 4
  max_consecutive_failures: 2
  max_cycles: 8
  auto_reject_retries: 1
  verifier_config:
    default_verifiers: [verifier]
    audit_sample_rate: 0.0
learning_gate:
  system: agora-continuum
  state_file: .mavis/learning_state.yaml
  required_before_implementation: true
  active_unit: U0-sonda-rate-limiter-robustness
  unblock_condition: learner_attempt_evaluated
  diagnostic_file: projects/01_rate_limiter/docs/diagnostic.md
tasks:
  - id: sonda-diagnostic
    title: 'Sonda diagnostic: learner attempt before implementation'
    assigned_to: sonda
    verified_by: verifier
    timeout_ms: 600000
    prompt: |
      You are Sonda for AI DevSchool Project 01.

      ## Inputs
      - Operating model: docs/PROMPTS/IDEIAS/codexDojo/06_agora_continuum_operating_model.md
      - Learning state: .mavis/learning_state.yaml
      - Diagnostic: projects/01_rate_limiter/docs/diagnostic.md

      ## Rules
      - Do not implement the rate limiter.
      - Do not provide finished solutions before a learner attempt exists.
      - If no learner attempt exists yet, report `awaiting: learner_attempt` and leave the implementation tasks blocked.
      - After a learner attempt exists, classify tests, refactoring, and code-reading ability using Dreyfus/Bloom language, then update `.mavis/learning_state.yaml`.

      ## Completion gate
      PASS only when the learner attempt has been evaluated and Prometor has defined executable verification for the first implementation task.
    verify_prompt: |
      Verify that Sonda did not provide finished solutions, that a learner attempt exists, and that `.mavis/learning_state.yaml` moved past `awaiting: learner_attempt`.

  - id: impl-go
    title: 'Go implementation: token-bucket rate limiter'
    assigned_to: dev-go
    depends_on: [sonda-diagnostic]
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      You are implementing the **Go** version of the Token-Bucket Rate Limiter for
      AI DevSchool Project 01. The spec and skeleton are pre-scaffolded by the user;
      your job is to fill in the TODOs with production-grade, idiomatic Go.

      ## Workspace
      - Project root: /Users/danielbarreto/Development/aidevschool/projects/01_rate_limiter
      - Spec:  projects/01_rate_limiter/docs/spec.md  **READ THIS FIRST, IN FULL**
      - Skeleton: projects/01_rate_limiter/go-impl/main.go  (fill in the TODOs)
      - Existing: go.mod, Dockerfile (do not modify the Dockerfile unless necessary)

      ## Required deliverables
      1. **go-impl/main.go** — implement all TODOs:
         - Thread-safe `RateLimiter` (use `sync.Mutex` + `map[string]*ClientBucket`, NOT `sync.Map` for read-heavy writes with mutation)
         - Lazy token refill: `tokens = min(C, lastTokens + (now - lastRefill) * r)`
         - Middleware that returns HTTP 429 with `Retry-After` header when bucket empty
         - Rate-limit headers on every limited response:
           `X-RateLimit-Limit`, `X-RateLimit-Remaining` (integer), `X-RateLimit-Reset` (Unix epoch seconds)
         - `/status` endpoint returning client_ip, tokens_remaining, max_capacity, refill_rate_per_second
         - Background cleanup goroutine that deletes buckets idle >1h (use `time.Ticker` + a separate mutex or sharded map)
         - Graceful shutdown on SIGINT/SIGTERM (close idle conns, drain in-flight)
         - Use `slog` (stdlib) for structured JSON logging
         - NEVER `panic` in prod code
      2. **go-impl/main_test.go** (or split into multiple `*_test.go`) with table-driven tests:
         - Token consumption under limit (200 OK)
         - 429 response with correct Retry-After value
         - Lazy refill after time.Sleep (or use a clock interface you can inject for determinism)
         - Concurrency safety: run with `go test -race`
         - Cover all 7 functional requirements from the spec
         - Target: >=80% coverage (`go test -cover`)
      3. **go-impl/README.md** — build/run/test instructions, expected port 8080
      4. **Verification before declaring done**:
         - `cd go-impl && go build ./...`  — must succeed with no warnings
         - `go test -race -cover ./...`    — must pass, >=80% coverage
         - `docker build -t rl-go .` (from go-impl/) — must succeed
         - Smoke test: `docker run --rm -p 8080:8080 rl-go` + `curl localhost:8080/` returns 200 JSON

      ## Idiomatic Go rules
      - `errors.Is` / `errors.As` for error handling, never `panic`
      - No `os.Getenv` scattered — define a `Config` struct loaded once in main
      - Small interfaces (1-2 methods)
      - Document WHY, not WHAT, in comments
      - No `TODO`/`FIXME` in shipped code

      ## When done
      - Update `/Users/danielbarreto/Development/aidevschool/docs/status.md` with:
        `phase: impl-done, lang: go, last_update: <ISO timestamp>, updated_by: dev-go`
      - Write `projects/01_rate_limiter/deliverable-impl-go.md` summarizing:
        what you built, lines of code (use `wc -l`), test coverage %, build size, and confirmation of all checks passing.

      Do NOT wait for other languages to finish. Do NOT poll CI. Build, test, exit.
    verify_prompt: |
      Independently verify the Go implementation. Do NOT just re-read the producer's
      deliverable. Re-derive correctness from first principles.

      Working dir: /Users/danielbarreto/Development/aidevschool/projects/01_rate_limiter/go-impl

      Re-run and check:
      1. `go build ./...` succeeds with no warnings
      2. `go test -race -cover ./...` passes; coverage >= 80%
      3. `go vet ./...` and `gofmt -l .` produce no output
      4. Spot-check 3 random tests by reading their assertions and confirming they actually test the behavior
      5. Read main.go and confirm:
         - No `panic()` calls in non-test code paths
         - No `time.Sleep` busy-loops in hot path (the refill must be lazy, not ticker-based)
         - Mutex is held only for the duration of map lookup + arithmetic, not the HTTP write
         - `/status` returns the spec's exact JSON shape: `client_ip`, `tokens_remaining`, `max_capacity`, `refill_rate_per_second`
         - Cleanup goroutine uses a ticker (not a per-request check)
         - 429 response includes `Retry-After` header
      6. Try to break it: write a small concurrent burst test (50 goroutines, 20 reqs each)
         and confirm the bucket is never over-consumed (sum of granted + 429 = total reqs).

      PASS only if all 6 checks succeed. FAIL with concrete file:line evidence otherwise.

  - id: impl-rust
    title: 'Rust implementation: token-bucket rate limiter'
    assigned_to: dev-rust
    depends_on: [sonda-diagnostic]
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      You are implementing the **Rust** version of the Token-Bucket Rate Limiter
      for AI DevSchool Project 01. Spec and skeleton pre-scaffolded; fill the TODOs
      with idiomatic Rust.

      ## Workspace
      - Project root: /Users/danielbarreto/Development/aidevschool/projects/01_rate_limiter
      - Spec:  projects/01_rate_limiter/docs/spec.md  **READ THIS FIRST, IN FULL**
      - Skeleton: projects/01_rate_limiter/rust-impl/src/main.rs  (fill in the TODOs)
      - Existing: Cargo.toml (axum 0.7, tokio, serde, tower), Dockerfile (multi-stage)

      ## Required deliverables
      1. **rust-impl/src/main.rs** — implement all TODOs:
         - Shared `AppState` wrapped in `Arc<tokio::sync::Mutex<HashMap<IpAddr, ClientBucket>>>` (or `DashMap` if you add it as a dep — your call)
         - `ClientBucket { tokens: f64, last_refill: Instant }`
         - Lazy refill math
         - axum middleware (`from_fn_with_state`) that:
           - Returns 200 with welcome JSON when allowed
           - Returns 429 + `Retry-After` when denied
           - Sets `X-RateLimit-Limit`, `X-RateLimit-Remaining`, `X-RateLimit-Reset` on every limited response
         - `/status` handler returning `client_ip`, `tokens_remaining`, `max_capacity`, `refill_rate_per_second`
         - Background tokio task that prunes idle buckets (>1h) every 5 min
         - `Result<T, E>` everywhere; `thiserror` for error types; NEVER `unwrap()` in non-test code
         - `tracing` + `tracing-subscriber` for structured JSON logs
         - Graceful shutdown on SIGINT/SIGTERM (`tokio::signal::ctrl_c`)
      2. **rust-impl/tests/** (integration) or inline `#[cfg(test)]` (unit):
         - Token consumption under limit
         - 429 + Retry-After correctness
         - Lazy refill (inject a `Clock` trait so tests can advance time without `tokio::time::sleep`)
         - Concurrency: spawn 50 tasks × 20 requests; verify no over-consumption
         - Cleanup of idle buckets
         - Target: >=80% coverage (`cargo tarpaulin` if available, else `cargo test` showing all tests pass)
      3. **rust-impl/README.md** — build/run/test instructions, port 8082
      4. **Verification**:
         - `cargo fmt --check` and `cargo clippy --all-targets -- -D warnings` — clean
         - `cargo build --release` — succeeds
         - `cargo test` — all pass
         - `docker build -t rl-rust .` — succeeds
         - Smoke test: `docker run --rm -p 8082:8082 rl-rust` + `curl localhost:8082/` returns 200 JSON

      ## Idiomatic Rust rules
      - `Result<T, E>` with `thiserror` for libs/bins
      - `Arc<Mutex<...>>` or `DashMap` for shared state; prefer `parking_lot::Mutex` if you swap it in
      - Avoid `clone()` where a reference would do
      - `&str` for read-only strings, `String` only when ownership is needed
      - Document WHY, not WHAT
      - No `unwrap()` in prod paths

      ## When done
      - Update `/Users/danielbarreto/Development/aidevschool/docs/status.md` with:
        `phase: impl-done, lang: rust, last_update: <ISO>, updated_by: dev-rust`
      - Write `projects/01_rate_limiter/deliverable-impl-rust.md` summarizing what you built, LoC, test pass count, and confirmation of all checks.
    verify_prompt: |
      Independently verify the Rust implementation. Re-derive correctness.

      Working dir: /Users/danielbarreto/Development/aidevschool/projects/01_rate_limiter/rust-impl

      Re-run and check:
      1. `cargo fmt --check` clean
      2. `cargo clippy --all-targets -- -D warnings` clean
      3. `cargo build --release` succeeds
      4. `cargo test` all pass
      5. Search for `unwrap()` in src/main.rs (excluding `#[cfg(test)]` modules and `expect` with messages) — must be zero in prod paths
      6. Read src/main.rs and confirm:
         - Shared state behind `Arc<Mutex<...>>` (or DashMap), not raw `RefCell`
         - Refill is lazy (computed on request, not via background ticker that mutates state)
         - `/status` returns the exact JSON shape: `client_ip`, `tokens_remaining`, `max_capacity`, `refill_rate_per_second`
         - 429 path includes `Retry-After` header
         - Cleanup task is on a tokio interval, not a tight loop
         - Graceful shutdown wired
      7. Try to break it: write a quick concurrency test in tests/ and run it — confirm no over-consumption.

      PASS only if all 7 checks succeed. FAIL with file:line evidence otherwise.

  - id: impl-node
