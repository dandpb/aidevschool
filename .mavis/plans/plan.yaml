  - id: code-review
    title: 'Cross-language code review, pedagogy, and quiz'
    assigned_to: reviewer
    depends_on: [impl-go, impl-rust, impl-node]
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      You are reviewing all 3 implementations of the Token-Bucket Rate Limiter
      and producing didactic material. The 3 implementations are now in
      projects/01_rate_limiter/{go,rust,node}-impl/.

      ## Inputs
      - Spec: projects/01_rate_limiter/docs/spec.md
      - Code: projects/01_rate_limiter/{go,rust,node}-impl/
      - Skeleton TODOs were filled by dev-go, dev-rust, dev-node

      ## Required deliverables in projects/01_rate_limiter/docs/
      1. **code_review.md**:
         - Summary table at top: per-implementation count of Critical/Major/Minor/Educational
         - Per-implementation issues, each formatted as:
           ```
           ### [SEVERITY-NNN] Title
           - File: path:line
           - Category: Security | Performance | Readability | Maintainability | Idiomaticity | Error Handling | Testing
           - Description: ...
           - Impact: ...
           - Remediation: (concrete steps)
           - Reference: link/doc/CWE
           - Aprendizado: (the general concept to internalize)
           ```
         - Severities: Critical (blocker) / Major / Minor / Educational
         - Cover ALL 7 categories at least once across the report
         - Cross-language comparison: a dedicated section comparing how concurrency, error handling, and state management were solved in each language
      2. **learning_notes.md**:
         - One section per language with: idioms used, strengths in this domain, weaknesses in this domain, when to pick this language for this kind of problem
         - One section "Concepts you should be able to answer after this project":
           1. What problem does this project solve and why does it matter?
           2. What is the reference architecture for an in-memory rate limiter?
           3. Why pick Go, Rust, or Node for this case? (use the data you have, not opinions)
           4. What real tradeoffs emerged in each language?
           5. How would you scale this from 100 to 1M users?
           6. What anti-patterns did you find and fix?
      3. **quiz.md**:
         - Exactly 5 questions
         - Mix of multiple-choice and short-answer/essay
         - Answer key with detailed explanation
         - Tests **comprehension**, not memorization (e.g., "Why is the lazy refill better than a background ticker?" not "What is capacity C set to?")
      4. Append at least 1 new generalization to **/Users/danielbarreto/Development/aidevschool/learning_journal.md** in the appropriate section (concurrency / HTTP idioms / anti-patterns).

      ## Posture
      - **Sem piedade técnica, máxima generosidade pedagógica** — rigorous but kind.
      - Praise what is well done. Don't only bug-hunt.
      - Don't repeat the same feedback in every cycle — check the journal first.
      - Don't call educational observations "Critical" (it scares learners).

      ## When done
      - Update `/Users/danielbarreto/Development/aidevschool/docs/status.md` to:
        `phase: review-done, awaiting: benchmark, last_update: <ISO>, updated_by: reviewer`
      - Write `projects/01_rate_limiter/deliverable-review.md` summarizing the top 3 issues per impl, the top 3 cross-language insights, and the top 3 quiz takeaways.
    verify_prompt: |
      Independently verify the review. Re-derive — do not just trust the producer.

      Working dir: /Users/danielbarreto/Development/aidevschool/projects/01_rate_limiter

      Re-check:
      1. Read all 3 implementations in full. Pick 3 issues from code_review.md at random and confirm:
         - The file:line is correct (open the file and jump to the line)
         - The description accurately describes what the code does
         - The remediation is concrete and would actually fix the issue
      2. Confirm severity assignments are consistent: no "Critical" for a naming nit; no "Minor" for a security hole
      3. Confirm the 7 audit categories (Security/Performance/Readability/Maintainability/Idiomaticity/Error Handling/Testing) each appear at least once across the report
      4. Read quiz.md: 5 questions, mixed formats, answer key present, explanations test comprehension (open one question, decide if a junior dev who memorized the spec would ace it — if yes, the question is bad)
      5. Read learning_notes.md: the 6 pedagogical questions are each answered concretely
      6. Confirm learning_journal.md was actually appended to (new entry visible)

      PASS only if all 6 checks succeed. FAIL with file:line evidence otherwise.

  - id: benchmark
    title: 'Load testing: k6 scenarios + Docker build + perf report'
    assigned_to: benchmarker
    depends_on: [code-review]
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      You are running load tests against the 3 implementations of the Token-Bucket
      Rate Limiter and producing a reproducible performance report.

      ## Workspace
      - Project: /Users/danielbarreto/Development/aidevschool/projects/01_rate_limiter
      - Spec: projects/01_rate_limiter/docs/spec.md  (defines ports 8080/8081/8082)
      - Dockerfiles: projects/01_rate_limiter/{go,rust,node}-impl/Dockerfile
      - Existing k6 script: projects/01_rate_limiter/benchmarks/k6_load_test.js  (review it; you may evolve it)

      ## Tools (paths)
      - k6: /opt/homebrew/bin/k6  (add `/opt/homebrew/bin` to PATH if needed: `export PATH=/opt/homebrew/bin:$PATH`)
      - autocannon: `$(npm root -g)/autocannon/bin/autocannon.js` — fallback if k6 has issues
      - `ab` (Apache Bench): `which ab` — final fallback (already installed)
      - `tokei` for LoC counting (try `cargo install tokei` if not present, else fall back to `cloc` or `wc -l`)

      ## Workflow
      1. **Build images** — from project root, for each impl:
         - `cd go-impl && docker build -t rl-go .` (and analogously for rust/node)
         - On Apple Silicon, the Go and Node base images are fine; for Rust, the Dockerfile already uses `rust:1.69-alpine` + musl.
      2. **Run containers** in background, one at a time per scenario to avoid resource contention:
         - `docker run -d --name rl-go -p 8080:8080 rl-go`
         - `docker run -d --name rl-rust -p 8082:8082 rl-rust`
         - `docker run -d --name rl-node -p 8081:8081 rl-node`
         - Confirm each with `curl -s localhost:PORT/` (should return welcome JSON, possibly 429 if you've already hammered it).
      3. **Smoke test** each impl with a short k6 run (10s, 5 VUs) before the real scenarios. Fix any port/protocol mismatch.
      4. **Write 4 scenarios** in `projects/01_rate_limiter/benchmarks/scenarios/`:
         - `baseline.js` — ~70% capacity, 60s
         - `stress.js` — 50% → 200% over 90s
         - `spike.js` — 10x → 1x → 10x, 60s
         - `endurance.js` — 80% capacity, **300s (5 min)** (NOT 30 min — budget)
         Each scenario must read `TARGET_PORT` from `__ENV` so the same script works for all 3 langs.
      5. **Run all 4 scenarios on all 3 impls**, N=3 runs each. Capture:
         - RPS (avg, peak)
         - Latency: avg, p50, p95, p99
         - Error rate %
         - CPU % (via `docker stats --no-stream` snapshot)
         - RAM MB (via `docker stats --no-stream` snapshot)
         - Image size: `docker images rl-{go,rust,node} --format '{{.Size}}'`
         - Cold start: `time docker run --rm -p PORT:PORT rl-{lang}` (do this once)
         - LoC: `tokei` (or `cloc`/`wc -l` fallback) for the source directory
      6. **Save raw results** in `projects/01_rate_limiter/benchmarks/results/{go,rust,node}/` — one JSON per scenario per run (k6 has `--out json=...`).
      7. **Write `projects/01_rate_limiter/docs/benchmark_results.md`** with:
         - **Section 1 — Environment & Methodology**: machine specs, Docker version, macOS thermal/load notes, k6 version, how warmup was handled, N runs
         - **Section 2 — Summary table (Baseline scenario)**:

           | Metric | Go | Rust | Node.js | Winner |
           |--------|----|------|---------|--------|
           | RPS (avg) | ... | ... | ... | ... |
           | Latency p50 (ms) | ... | ... | ... | ... |
           | Latency p95 (ms) | ... | ... | ... | ... |
           | Latency p99 (ms) | ... | ... | ... | ... |
           | Error rate (%) | ... | ... | ... | ... |
           | RAM (MB) | ... | ... | ... | ... |
           | CPU (%) | ... | ... | ... | ... |
           | Image size (MB) | ... | ... | ... | ... |
           | Cold start (s) | ... | ... | ... | ... |
           | LoC | ... | ... | ... | ... |

         - **Section 3 — Per-scenario analysis** (Baseline / Stress / Spike / Endurance): one subsection each with mini-table, key observations, ASCII chart (use `gnuplot` if available, else simple text bars)
         - **Section 4 — Bottlenecks identified per implementation** (this is critical input for the optimizer)
         - **Section 5 — Recommendations for the optimizer agent**: list the top 2-3 optimizations the data suggests
         - **Section 6 — Limitations & caveats**: Docker Desktop CPU throttling on macOS, single-machine, container-to-container network noise, etc.
      8. **Append a methodology entry** to `/Users/danielbarreto/Development/aidevschool/learning_journal.md` under "Benchmark methodology".

      ## Honesty rules
      - N>=3 runs, report median + stddev
      - If a number is wildly variable across runs, say so — don't claim a winner on noisy data
      - Acknowledge that running 3 containers concurrently on a single macOS box will produce CPU contention; the relative ordering is still meaningful, absolute numbers are not
      - Don't claim a lang "wins" on a metric where the difference is < 10% AND p > 0.05

      ## When done
      - Update `/Users/danielbarreto/Development/aidevschool/docs/status.md` to:
        `phase: benchmark-done, awaiting: optimization, last_update: <ISO>, updated_by: benchmarker`
      - Write `projects/01_rate_limiter/deliverable-benchmark.md` summarizing the headline numbers, the winner per metric, and the top 3 recommendations for the optimizer.
    verify_prompt: |
      Independently verify the benchmark. Re-derive — do not just read the report.

      Working dir: /Users/danielbarreto/Development/aidevschool/projects/01_rate_limiter

      Re-check:
      1. Pick the smallest k6 scenario (baseline) and re-run it once against ONE of the implementations (whichever is currently running). Confirm the reported RPS is within ±20% of what you observe.
      2. Open `docs/benchmark_results.md` and confirm:
         - All 4 scenarios are present (Baseline / Stress / Spike / Endurance)
         - The summary table has all 10 metrics × 3 langs populated
         - The "Limitations" section is non-empty and honest
         - Bottlenecks are evidence-based (cite the data, don't speculate)
         - The recommendations section actually lists 2-3 concrete optimizations
      3. Confirm `benchmarks/results/{go,rust,node}/` contains raw JSON files (at least 4 per lang)
