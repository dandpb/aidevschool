      1. **node-impl/src/index.ts** — implement all TODOs:
         - In-memory `Map<string, ClientBucket>` for client state
         - Lazy refill math
         - Express middleware that:
           - Returns 200 + welcome JSON when allowed
           - Returns 429 + `Retry-After` when denied
           - Sets `X-RateLimit-Limit`, `X-RateLimit-Remaining` (integer), `X-RateLimit-Reset` (Unix seconds) on every limited response
         - `/status` endpoint returning `client_ip`, `tokens_remaining`, `max_capacity`, `refill_rate_per_second`
