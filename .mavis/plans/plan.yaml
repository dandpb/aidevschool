  - id: optimize
    title: 'Apply optimizations, re-measure, write evolution report'
    assigned_to: optimizer
    depends_on: [benchmark]
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      You are optimizing the 3 implementations based on the benchmark findings and
      producing the evolution report that closes the cycle.

      ## Workspace
      - Project: /Users/danielbarreto/Development/aidevschool/projects/01_rate_limiter
      - Benchmark: projects/01_rate_limiter/docs/benchmark_results.md
      - Review: projects/01_rate_limiter/docs/code_review.md
      - Code: projects/01_rate_limiter/{go,rust,node}-impl/

      ## Workflow
      1. Read both reports. Identify the **TOP 2-3 bottlenecks** across the 3 implementations. Form a hypothesis with evidence for each (cite the benchmark numbers).
      2. Pick **ONE optimization pattern per implementation** from the catalog:
         - Memory allocation: pre-allocated buffers, object pools, sharded maps to reduce mutex contention
         - Caching layer: keep parsed config in atomic.Value
         - Lock-free / sharded state: per-bucket mutex instead of global map mutex
         - Async batching: batch cleanup instead of per-key check
         - Connection pooling: only relevant if any impl added external HTTP calls (probably not here)
         - Protocol upgrade: only if the bottleneck is HTTP parsing
         - Per-IP token bucket pre-warming
      3. **Apply ONE optimization per language**. Keep changes minimal and focused. Tests must still pass after each change.
      4. **Re-run the benchmark** with the EXACT same scripts and N>=3 runs. Compute deltas (before/after) for RPS, p99, RAM, CPU. Note statistical significance.
      5. **Document rejected optimizations** too — at least one attempt you made that didn't work, and why. This is anti-knowledge that's just as valuable.

