      2. `npm test` all pass; coverage >= 80%
      3. Search `src/index.ts` for `any` — must be zero (or only with justification comment)
      4. Search for empty `.catch(` — must be zero
      5. Search for `process.on('unhandledRejection'` — should exist
      6. Read src/index.ts and confirm:
         - In-memory Map for state, refill lazy
         - `/status` returns the exact JSON shape: `client_ip`, `tokens_remaining`, `max_capacity`, `refill_rate_per_second`
         - 429 includes `Retry-After` header
