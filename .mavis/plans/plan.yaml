    depends_on: [sonda-diagnostic]
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      You are implementing the **Node.js/TypeScript** version of the Token-Bucket
      Rate Limiter for AI DevSchool Project 01. Spec and skeleton pre-scaffolded;
      fill the TODOs with idiomatic TypeScript.

      ## Workspace
      - Project root: /Users/danielbarreto/Development/aidevschool/projects/01_rate_limiter
      - Spec:  projects/01_rate_limiter/docs/spec.md  **READ THIS FIRST, IN FULL**
      - Skeleton: projects/01_rate_limiter/node-impl/src/index.ts  (fill in the TODOs)
      - Existing: package.json (express), tsconfig.json (strict:true), Dockerfile (multi-stage)

