version: 1
plan:
  name: 'criar agent.md + PERSONA.md para os 9 agents do ÁGORA incompletos (Mavis + repo)'
  max_concurrency: 6
  max_consecutive_failures: 2
  max_cycles: 4
  auto_reject_retries: 1
  verifier_config:
    default_verifiers: [verifier]
    audit_sample_rate: 0.0
tasks:
  # ============================================================
  # Grupo 1 — Orquestração e Diagnóstico
  # ============================================================
  - id: persona-sonda
    title: 'persona Sonda (diagnóstico Dreyfus×Bloom) — Mavis + repo'
    assigned_to: general
    verified_by: verifier
    timeout_ms: 1500000
    prompt: |
      OBJETIVO
      Criar os arquivos `agent.md` (regras operacionais) e `PERSONA.md` (voz e workflow)
      para o agent **sonda** do ÁGORA Continuum. Espelhar o conteúdo IDÊNTICO em DOIS lugares:
      o registry do Mavis (operacional) e o repo do projeto (documentação canônica).

      FONTES CANÔNICAS (leia PRIMEIRO, na ordem):
      1. Formato de referência validado (template):
         - ~/.mavis/agents/cartografo/agent.md
         - ~/.mavis/agents/cartografo/PERSONA.md
      2. Descrição canônica do projeto:
         - /Users/danielbarreto/Development/aidevschool/docs/PROMPTS/00_IDEIAS.md (procure "SONDA" e "03 — SONDA")
         - /Users/danielbarreto/Development/aidevschool/minimaxDojo/agents/03_sonda/README.md

      4 ARQUIVOS A CRIAR (conteúdo IDÊNTICO em pares Mavis↔repo):
      1. ~/.mavis/agents/sonda/agent.md
      2. ~/.mavis/agents/sonda/PERSONA.md
      3. /Users/danielbarreto/Development/aidevschool/minimaxDojo/agents/03_sonda/agent.md
      4. /Users/danielbarreto/Development/aidevschool/minimaxDojo/agents/03_sonda/PERSONA.md

      ESTRUTURA ESPERADA
      agent.md (espelhar cartografo/agent.md) — cobrir:
      - Voice & register (idioma, tom, formalidade)
      - Evidence discipline (como exigir evidência executável, não opinião)
      - Boundaries (o que Sonda NÃO faz)
      - State management (como atualiza learner profile / sondes)
      - Async discipline
      - Memory (qual camada)
      - Ambiguity

      PERSONA.md (espelhar cartografo/PERSONA.md) — cobrir:
      - Missão (1-2 frases)
      - Workflow por unidade/ciclo
      - Anti-patterns a evitar
      - Mental models (Dreyfus × Bloom, ZPD, pré-requisitos)
      - Output esperado (artefatos: diagnostic.md, sonde-NNN.md)
      - Voice (1-2 frases)

      IDIOMA: pt-BR. Identifiers técnicos (path, comando, schema) ficam em forma nativa.

      REGRAS DE CONTEÚDO:
      - Reflita FIELMENTE a descrição canônica — não invente ferramentas, contratos ou
        inputs que não estão no README.md nem em 00_IDEIAS.md.
      - Use o modelo de LLM correto extraído do README.md (Sonda = sonnet).
      - Use "Contexto isolado" do README.md para definir boundaries (Sonda NÃO vê trilha,
        só LANGUAGE_FOCO + nível + objetivo).
      - Use "Quando invocar" do README.md para definir o workflow.
      - Seja conciso: cartografo tem 63+47 linhas. Mantenha proporção similar (±30%).
      - Não copie o agent.md/PERSONA.md do cartografo literalmente — adapte ao papel de
        diagnóstico.

      VERIFICAÇÃO PRÉ-ENTREGA (rode antes de fechar):
      - [ ] Os 4 arquivos existem e não estão vazios
      - [ ] diff(agent.md Mavis, agent.md repo) está vazio
      - [ ] diff(PERSONA.md Mavis, PERSONA.md repo) está vazio
      - [ ] Estrutura segue cartografo (mesmas seções principais)
      - [ ] Conteúdo alinhado com 00_IDEIAS.md + README.md
      - [ ] Idioma pt-BR

      Escreva um deliverable.md curto em
      /Users/danielbarreto/Development/aidevschool/.mavis/plans/persona-sonda-deliverable.md
      com: confirmação dos 4 arquivos, contagem de linhas, e decisões editoriais relevantes.
    verify_prompt: |
      Você é o verificador adversarial da criação de persona para o agent **sonda** do
      ÁGORA Continuum. NÃO leia o deliverable.md do produtor — faça a verificação INDEPENDENTE.

      ETAPAS DE VERIFICAÇÃO
      1. Leia as FONTES CANÔNICAS PRIMEIRO (não confie no produtor):
         - /Users/danielbarreto/Development/aidevschool/docs/PROMPTS/00_IDEIAS.md (seção SONDA)
         - /Users/danielbarreto/Development/aidevschool/minimaxDojo/agents/03_sonda/README.md
         - ~/.mavis/agents/cartografo/agent.md (formato)
         - ~/.mavis/agents/cartografo/PERSONA.md (formato)

      2. Leia os 4 ARQUIVOS PRODUZIDOS:
         - ~/.mavis/agents/sonda/agent.md
         - ~/.mavis/agents/sonda/PERSONA.md
         - /Users/danielbarreto/Development/aidevschool/minimaxDojo/agents/03_sonda/agent.md
         - /Users/danielbarreto/Development/aidevschool/minimaxDojo/agents/03_sonda/PERSONA.md

      3. VERIFICAÇÕES OBRIGATÓRIAS (cada uma PASS ou FAIL com evidência textual):
         a) Os 4 arquivos existem e têm conteúdo não-trivial (>20 linhas cada).
         b) diff(agent.md Mavis, agent.md repo) está vazio.
         c) diff(PERSONA.md Mavis, PERSONA.md repo) está vazio.
         d) agent.md cobre as 7 seções canônicas (Voice, Evidence, Boundaries, State, Async, Memory, Ambiguity).
         e) PERSONA.md cobre as 6 seções canônicas (Mission, Workflow, Anti-patterns, Mental models, Output, Voice).
         f) Conteúdo reflete o papel de diagnóstico Dreyfus×Bloom (não inventou papéis novos).
         g) Modelo de LLM correto: sonnet (Sonda).
         h) Boundaries corretas: NÃO vê trilha, só LANGUAGE_FOCO + nível + objetivo.
         i) Idioma pt-BR no corpo (identifiers técnicos em forma nativa).

      4. VERIFICAÇÃO ADVERSARIAL (re-derive, não re-leia):
         - O conteúdo "viajou"? (menciona ferramentas, contratos ou inputs não presentes
           no README.md ou em 00_IDEIAS.md?)
         - As boundaries batem com o "Contexto isolado" do README.md?
         - O workflow reflete os 3 gatilhos de "Quando invocar" do README.md?
         - O output esperado cita `sonde-NNN.md` (path presente no README)?

      VEREDICTO: PASS só se TODAS as 9 verificações passarem.
      Em qualquer FAIL, liste: item (letra) + trecho exato do arquivo + correção esperada.

